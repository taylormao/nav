# ============================================================
# Cloudflare Worker — R2 sync proxy 部署配置
#
# 部署前需执行:
#   1. npx wrangler r2 bucket create nav-data
#   2. npx wrangler secret put AUTH_TOKEN
#   3. npx wrangler deploy
#
# 文档: https://developers.cloudflare.com/workers/
# ============================================================

name = "nav-r2-sync"
main = "worker.js"
compatibility_date = "2025-06-19"

# R2 存储桶绑定
[[r2_buckets]]
bucket_name = "nav-data"
binding = "NAV_BUCKET"

# Worker 环境变量 (AUTH_TOKEN 用 secret 设置，不写在这里)
# npx wrangler secret put AUTH_TOKEN
